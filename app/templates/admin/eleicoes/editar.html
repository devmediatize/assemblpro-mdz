{% extends "base.html" %}

{% block body %}
<div class="app-container">
    {% include "components/sidebar.html" %}

    <main class="main-content">
        <div class="content-header">
            <a href="/admin/eleicoes" class="back-link">
                <i class="fas fa-arrow-left"></i> Voltar para Eleições
            </a>
            <h1>Editar Eleição</h1>
            <p class="subtitle">Edite os dados da eleição</p>
        </div>

        <div id="loadingContainer" style="text-align: center; padding: 3rem;">
            <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--accent-green);"></i>
            <p style="margin-top: 1rem; color: var(--text-muted);">Carregando...</p>
        </div>

        <div id="formContainer" style="display: none;">
            <div class="card">
                <form id="formEleicao">
                    <div class="form-section">
                        <h3><i class="fas fa-info-circle" style="color: var(--accent-green);"></i> Dados Gerais</h3>

                        <div class="form-group">
                            <label class="form-label">Título da Eleição *</label>
                            <input type="text" class="form-control" id="titulo" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" id="descricao" rows="3"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tipo de Eleição *</label>
                            <select class="form-control" id="tipo">
                                <option value="conselho">Conselho</option>
                                <option value="assembleia">Assembleia</option>
                                <option value="chapa">Chapa</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-calendar-alt" style="color: var(--accent-blue);"></i> Período</h3>

                        <div class="row">
                            <div class="col-6">
                                <div class="form-group">
                                    <label class="form-label">Data Início *</label>
                                    <input type="datetime-local" class="form-control" id="dataInicio" required>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-group">
                                    <label class="form-label">Data Fim *</label>
                                    <input type="datetime-local" class="form-control" id="dataFim" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-sliders-h" style="color: var(--accent-purple);"></i> Regras</h3>

                        <div class="form-group">
                            <label class="form-label">Máximo de Votos por Cooperado</label>
                            <input type="number" class="form-control" id="maxVotos" min="1" max="10" value="1">
                        </div>

                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="exigeMfa">
                                <span>Exigir verificação por SMS/Email (MFA)</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="permiteVotoBranco">
                                <span>Permitir voto em branco</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/admin/eleicoes" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary" id="btnSalvar">
                            <i class="fas fa-save"></i> Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<style>
.back-link {
    color: var(--text-secondary);
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
}

.form-section {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--border-color);
}

.form-section:last-of-type {
    border-bottom: none;
}

.form-section h3 {
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.row {
    display: flex;
    gap: 1rem;
}

.col-6 {
    flex: 1;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    padding: 0.75rem;
    background: var(--bg-input);
    border-radius: 8px;
    margin-bottom: 0.5rem;
}

.checkbox-label input {
    width: 20px;
    height: 20px;
    accent-color: var(--accent-green);
}

.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 1rem;
    padding-top: 1.5rem;
    margin-top: 1rem;
    border-top: 1px solid var(--border-color);
}
</style>
{% endblock %}

{% block scripts %}
<script>
const eleicaoId = {{ eleicao_id }};

async function carregarEleicao() {
    try {
        const response = await AssemblPro.utils.fetch(`/eleicoes/${eleicaoId}`);
        if (!response.ok) {
            throw new Error('Eleição não encontrada');
        }

        const eleicao = await response.json();

        // Preenche o formulário
        document.getElementById('titulo').value = eleicao.titulo || '';
        document.getElementById('descricao').value = eleicao.descricao || '';
        document.getElementById('tipo').value = eleicao.tipo || 'conselho';
        document.getElementById('maxVotos').value = eleicao.max_votos || 1;
        document.getElementById('exigeMfa').checked = eleicao.exige_mfa || false;
        document.getElementById('permiteVotoBranco').checked = eleicao.permite_voto_branco || false;

        // Formata datas
        if (eleicao.data_inicio) {
            const inicio = new Date(eleicao.data_inicio);
            document.getElementById('dataInicio').value = formatDateTimeLocal(inicio);
        }
        if (eleicao.data_fim) {
            const fim = new Date(eleicao.data_fim);
            document.getElementById('dataFim').value = formatDateTimeLocal(fim);
        }

        // Mostra formulário
        document.getElementById('loadingContainer').style.display = 'none';
        document.getElementById('formContainer').style.display = 'block';

    } catch (error) {
        AssemblPro.utils.toast(error.message, 'error');
        setTimeout(() => window.location.href = '/admin/eleicoes', 2000);
    }
}

function formatDateTimeLocal(date) {
    const pad = n => n.toString().padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

document.getElementById('formEleicao').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('btnSalvar');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

    const data = {
        titulo: document.getElementById('titulo').value,
        descricao: document.getElementById('descricao').value,
        tipo: document.getElementById('tipo').value,
        data_inicio: new Date(document.getElementById('dataInicio').value).toISOString(),
        data_fim: new Date(document.getElementById('dataFim').value).toISOString(),
        max_votos: parseInt(document.getElementById('maxVotos').value),
        exige_mfa: document.getElementById('exigeMfa').checked,
        permite_voto_branco: document.getElementById('permiteVotoBranco').checked
    };

    try {
        const response = await AssemblPro.utils.fetch(`/eleicoes/${eleicaoId}`, {
            method: 'PUT',
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!response.ok) {
            throw new Error(result.detail || 'Erro ao salvar');
        }

        AssemblPro.utils.toast('Eleição atualizada com sucesso!', 'success');
        window.location.href = '/admin/eleicoes';

    } catch (error) {
        AssemblPro.utils.toast(error.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Salvar Alterações';
    }
});

carregarEleicao();
</script>
{% endblock %}
