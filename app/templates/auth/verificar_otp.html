{% extends "base.html" %}

{% block body %}
<div class="login-container">
    <div class="login-card fade-in">
        <div class="login-logo">
            <div class="icon">
                <i class="fas fa-shield-check"></i>
            </div>
            <h1>Verificação</h1>
            <p>Digite o código enviado para seu celular</p>
        </div>

        <form id="otpForm">
            <div class="form-group">
                <label class="form-label">Código de Verificação</label>
                <div style="display: flex; gap: 0.5rem; justify-content: center;">
                    <input type="text" class="form-control otp-input" maxlength="1" style="width: 50px; text-align: center; font-size: 1.5rem; font-weight: 600;">
                    <input type="text" class="form-control otp-input" maxlength="1" style="width: 50px; text-align: center; font-size: 1.5rem; font-weight: 600;">
                    <input type="text" class="form-control otp-input" maxlength="1" style="width: 50px; text-align: center; font-size: 1.5rem; font-weight: 600;">
                    <input type="text" class="form-control otp-input" maxlength="1" style="width: 50px; text-align: center; font-size: 1.5rem; font-weight: 600;">
                    <input type="text" class="form-control otp-input" maxlength="1" style="width: 50px; text-align: center; font-size: 1.5rem; font-weight: 600;">
                    <input type="text" class="form-control otp-input" maxlength="1" style="width: 50px; text-align: center; font-size: 1.5rem; font-weight: 600;">
                </div>
            </div>

            <div id="otpError" style="display: none; color: var(--accent-red); font-size: 0.9rem; margin-bottom: 1rem; text-align: center;"></div>

            <button type="submit" class="btn btn-primary btn-lg btn-block mt-3" id="btnVerificar">
                <span>Verificar</span>
                <i class="fas fa-check"></i>
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem;">
            <a href="#" onclick="reenviarCodigo()" style="color: var(--accent-green);">
                <i class="fas fa-redo"></i> Reenviar código
            </a>
        </p>

        <p style="text-align: center; margin-top: 1rem;">
            <a href="/login" style="color: var(--text-secondary);">
                <i class="fas fa-arrow-left"></i> Voltar ao login
            </a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Auto-focus nos inputs OTP
const otpInputs = document.querySelectorAll('.otp-input');

otpInputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
        if (e.target.value && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
        }
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
            otpInputs[index - 1].focus();
        }
    });
});

document.getElementById('otpForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const codigo = Array.from(otpInputs).map(i => i.value).join('');
    const btnVerificar = document.getElementById('btnVerificar');
    const errorDiv = document.getElementById('otpError');

    if (codigo.length !== 6) {
        errorDiv.textContent = 'Digite o código completo';
        errorDiv.style.display = 'block';
        return;
    }

    btnVerificar.disabled = true;
    btnVerificar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
    errorDiv.style.display = 'none';

    try {
        const result = await AssemblPro.auth.verificarOTP(codigo);

        if (result.user_type === 'admin') {
            window.location.href = '/admin/dashboard';
        } else {
            window.location.href = '/votar';
        }
    } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        btnVerificar.disabled = false;
        btnVerificar.innerHTML = '<span>Verificar</span><i class="fas fa-check"></i>';

        // Limpa os inputs
        otpInputs.forEach(i => i.value = '');
        otpInputs[0].focus();
    }
});

async function reenviarCodigo() {
    AssemblPro.utils.toast('Código reenviado!', 'success');
}
</script>
{% endblock %}
